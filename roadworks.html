<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Roadworks" />
    <meta property="og:description" content="" />
    <meta property="og:image"
        content="https://raw.githubusercontent.com/RobTheDudeYo/robthedudeyo.github.io/main/favicon.ico" />
    <meta property="og:url" content="https://robthedudeyo.github.io/" />
    <title>Roadworks</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: conic-gradient(at 125% 50%,
                    #b78cf7,
                    #ff7c94,
                    #ffcf0d,
                    #ff7c94,
                    #b78cf7);
        }

        .roadworks {
            height: 100vh;
            border-radius: 0;
            padding: 10px;
            overflow: auto;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .event-container {
            background-color: #f7f7f7;
            border: 1px solid #ddd;
            margin: 10px;
            padding: 15px;
            border-radius: 5px;
        }

        /* Style for the date and time */
        .date-time {
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Style for the event details */
        .event-details {
            margin-bottom: 10px;
        }

        /* Style for the event description */
        .event-description {
            font-style: italic;
        }

        /* Apply media query for mobile responsiveness */
        @media (max-width: 768px) {
            .event-container {
                margin: 10px 0;
            }
        }
    </style>
</head>

<body>
    <div class="panel roadworks">checking</div>
</body>

<script>
    // I bodged this together in Python and then got gpt-3.5 to translate it to JS for me.
    class RoadworksAPI {
        constructor() {
            this.base_url = "https://roadworks.gov.gg/arcgis/rest/services/GSW/MapServer/2/query";
        }

        async _getRoadworksData(date) {
            if (date.length !== 8) {
                throw new Error("Date must be in the format YYYYMMDD");
            }

            const params = new URLSearchParams({
                f: "json",
                where: `S_DATE <= '${date} 2359' AND E_DATE >= '${date} 0000' AND TYPE <> 'No TM'`,
                returnGeometry: "false",
                outFields: "NAME,S_DATE,E_DATE,JOBID,DESCRIPT,Promoter,Location,Type,TIA,Timing,WorkType,Authority",
            });

            const response = await fetch(`${this.base_url}?${params}`);

            if (!response.ok) {
                throw new Error(`Failed to retrieve roadworks data. Status code: ${response.status}`);
            }

            const data = await response.json();
            const roadClosures = data.features || [];
            return roadClosures.map(road => road.attributes);
        }

        async get(roads, date = null) {
            if (!date) {
                const tomorrowsDate = new Date();
                tomorrowsDate.setDate(tomorrowsDate.getDate() + 1);
                date = tomorrowsDate.toISOString().slice(0, 10).replace(/-/g, "");
            }

            const roadworksData = await this._getRoadworksData(date);

            const filteredData = roadworksData.filter(road =>
                roads.includes(road.Location.split(" - ")[1])
            );

            return filteredData;
        }
    }

    function formatDate(date) {
        // Parse the input date string
        var year = parseInt(date.substr(0, 4));
        var month = parseInt(date.substr(4, 2)) - 1; // Month is 0-indexed
        var day = parseInt(date.substr(6, 2));
        var hours = parseInt(date.substr(9, 2));
        var minutes = parseInt(date.substr(11, 2));

        // Create a new Date object
        var date = new Date(year, month, day, hours, minutes);

        // Define options for formatting
        var options = {
            month: '2-digit',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
        };

        // Format the date
        var formattedDate = date.toLocaleDateString('en-UK', options);

        // Display the formatted date
        return formattedDate;
    }

    function capitalizeFirstLetterOfEachWord(string) {
        return string.replace(/\w\S*/g, function (word) {
            return word.charAt(0).toUpperCase() + word.substr(1).toLowerCase();
        });
    }

    async function main() {
        formatDate("20210609 0000")
        const watchedRoads = [
            "COURTIL ST. JACQUES",
            "GREEN LANES",
            "ROZEL ROAD",
            "LA COUTURE",
            "ROUTE DE LA RAMEE",
            "LA ROUTE DES LONGS CAMPS",
            "LES ABREUVEURS ROAD",
            "LES CANUS",
            "LA ROUTE DES CAPELLES",
            "LES GRANDES CAPELLES LANE",
            "LES HOUGUES MAGUES ROAD",
            "HOUGUES MAGUES LANE",
            "LE GRAND FORT ROAD",
            "BRAYE DU VALLE",
            "LA ROUTE DU BRAYE",
        ];


        try {
            const api = new RoadworksAPI();
            const data = await api.get(watchedRoads);
            const textBox = document.getElementsByClassName("roadworks")[0];
            if (!data.length) {
                textBox.innerHTML = `No roadworks found for the given roads.`;
            } else {
                textBox.innerHTML = ``;
                data.forEach(item => {
                    // console.log(JSON.stringify(item, null, 4));
                    textBox.innerHTML += `
                    <div class="event-container">
                    <div class="date-time">${formatDate(item.S_DATE)} to ${formatDate(item.E_DATE)}</div>
                    <div class="event-details">
                    <div class="event-description">${item.Type}<br>
                    ${capitalizeFirstLetterOfEachWord(item.Location.split(` - `)[1])}</div>
                    <div class="event-category">${item.Promoter}</div>
                    <div class="event-duration">${item.Timing}</div>
                    </div>
                    </div>`;
                });
            }
        } catch (e) {
            console.log("Exception:", e);
        }
    }

    main();
</script>

</html>
