<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Roadworks" />
    <meta property="og:description" content="" />
    <meta property="og:image"
        content="https://raw.githubusercontent.com/RobTheDudeYo/robthedudeyo.github.io/main/favicon.ico" />
    <meta property="og:url" content="https://robthedudeyo.github.io/" />
    <title>Roadworks</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            background-image: conic-gradient(at 125% 50%,
                    #b78cf7,
                    #ff7c94,
                    #ffcf0d,
                    #ff7c94,
                    #b78cf7);
            margin: 0;
        }

        .container {
            font-family: Arial, Helvetica, sans-serif;
            background-color: 0;
            padding: max(4vh, 4vw);
            overflow: hidden;
            box-sizing: border-box;
            overflow: hidden;
            max-width: max(55vw, 55vh);
            min-height: 100vh;
            margin-left: auto;
            margin-right: auto;
        }

        .event {
            background-color: rgba(255, 255, 255, 0.65);
            border: 1px solid black;
            margin-bottom: max(2vh, 2vw);
            border-radius: 15px;
            text-align: center;
        }

        .event-road {
            background-image: linear-gradient(to bottom, #f0f78c, #ff8e0d);
            border-radius: 15px 15px 0 0;
            padding: max(2vh, 2vw);
            font-weight: bold;
        }

        .date-time {
            padding-left: max(1.5vh, 1.5vw);
            padding-top: max(1vh, 1vw);
            padding-bottom: max(0.5vh, 0.5vw);
            padding-right: max(1vh, 1vw);
            font-weight: bold;
        }

        .event-duration {
            padding-left: max(1vh, 1vw);
        }

        .event-details {
            padding-left: max(2vh, 2vw);
            font-style: italic;
        }

        .event-description {
            padding-left: max(2vh, 2vw);
        }

        .event-category {
            padding-left: max(2vh, 2vw);
            margin-bottom: max(1vh, 1vw);
        }

        /* Apply media query for mobile responsiveness */
        /* I don't know what this does lol */
        @media (max-width: 758) {
            .event-container {
                margin: 10px 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">checking</div>
</body>

<script>
    // I bodged this together in Python and then got gpt-3.5 to translate it to JS for me.
    class RoadworksAPI {
        constructor() {
            this.base_url = "https://roadworks.gov.gg/arcgis/rest/services/GSW/MapServer/2/query";
        }

        async _getRoadworksData(date) {
            if (date.length !== 8) {
                throw new Error("Date must be in the format YYYYMMDD");
            }

            const params = new URLSearchParams({
                f: "json",
                where: `S_DATE <= '${date} 2359' AND E_DATE >= '${date} 0000' AND TYPE <> 'No TM'`,
                returnGeometry: "false",
                outFields: "NAME,S_DATE,E_DATE,JOBID,DESCRIPT,Promoter,Location,Type,TIA,Timing,WorkType,Authority",
            });

            const response = await fetch(`${this.base_url}?${params}`);

            if (!response.ok) {
                throw new Error(`Failed to retrieve roadworks data. Status code: ${response.status}`);
            }

            const data = await response.json();
            const roadClosures = data.features || [];
            return roadClosures.map(road => road.attributes);
        }

        async get(roads, date = null) {
            if (!date) {
                const tomorrowsDate = new Date();
                tomorrowsDate.setDate(tomorrowsDate.getDate() + 1);
                date = tomorrowsDate.toISOString().slice(0, 10).replace(/-/g, "");
            }

            const roadworksData = await this._getRoadworksData(date);

            const filteredData = roadworksData.filter(road =>
                roads.includes(road.Location.split(" - ")[1])
            );

            return filteredData;
        }
    }

    function formatDate(date) {
        // Parse the input date string
        var year = parseInt(date.substr(0, 4));
        var month = parseInt(date.substr(4, 2)) - 1; // Month is 0-indexed
        var day = parseInt(date.substr(6, 2));
        var hours = parseInt(date.substr(9, 2));
        var minutes = parseInt(date.substr(11, 2));

        // Create a new Date object
        var date = new Date(year, month, day, hours, minutes);

        // Define options for formatting
        var options = {
            month: '2-digit',
            day: 'numeric',
            hour: 'numeric',
            hour12: true,
        };

        // Format the date
        var formattedDate = date.toLocaleDateString('en-UK', options);

        // Display the formatted date
        return formattedDate;
    }

    function capitalizeFirstLetterOfEachWord(string) {
        return string.replace(/\w\S*/g, function (word) {
            return word.charAt(0).toUpperCase() + word.substr(1).toLowerCase();
        });
    }

    async function main() {
        const watchedRoads = [
            "COURTIL ST. JACQUES",
            "GREEN LANES",
            "ROZEL ROAD",
            "LA COUTURE",
            "ROUTE DE LA RAMEE",
            "LA ROUTE DES LONGS CAMPS",
            "LES ABREUVEURS ROAD",
            "LES CANUS",
            "LA ROUTE DES CAPELLES",
            "LES GRANDES CAPELLES LANE",
            "LES HOUGUES MAGUES ROAD",
            "HOUGUES MAGUES LANE",
            "LE GRAND FORT ROAD",
            "BRAYE DU VALLE",
            "LA ROUTE DU BRAYE",
        ];
        try {
            const api = new RoadworksAPI();
            const data = await api.get(watchedRoads);
            const textBox = document.getElementsByClassName("container")[0];
            if (!data.length) {
                textBox.innerHTML = `
                    <div class="event">
                        <div class="event-road" style="border-radius: 15px 15px 15px 15px">
                            No closures found for the roads you are watching.
                        </div>
                    </div>`;
            } else {
                textBox.innerHTML = ``;
                data.sort((a, b) => (a.Location.split(` - `)[1] > b.Location.split(` - `)[1]) ? 1 : -1);
                data.forEach(item => {
                    // console.log(JSON.stringify(item, null, 4));
                    textBox.innerHTML += `
                    <div class="event">
                        <div class="event-road">
                            ${capitalizeFirstLetterOfEachWord(item.Location.split(` - `)[1])}
                        </div>
                        <div class="date-time">
                            ${formatDate(item.S_DATE)} - ${formatDate(item.E_DATE)}
                        </div>
                        <div class="event-duration">
                            ${item.Timing}
                        </div>
                        <div class="event-description">
                            ${item.Type}
                        </div>
                        <div class="event-category">
                            ${item.Promoter}
                        </div>
                    </div>`;
                });
            }
        } catch (e) {
            console.log("Exception:", e);
        }
    }

    main();
</script>

</html>
